# Nama workflow yang akan muncul di tab "Actions" GitHub
name: Deploy Flutter Web to GitHub Pages

# Pemicu: workflow ini berjalan setiap kali ada push ke branch 'development'
on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    # Menggunakan environment Ubuntu terbaru
    runs-on: ubuntu-latest

    steps:
      # 1. Meng-clone repositori Anda ke dalam runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Menyiapkan Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable" # Anda bisa ganti ke 'beta' atau versi spesifik

      # 3. Menginstall dependensi proyek
      - name: Install dependencies
        run: flutter pub get

      # 4. Membangun aplikasi Flutter web
      # PENTING: Ganti <nama-repositori> dengan nama repo Anda!
      - name: Build Flutter web
        run: flutter build web --base-href /

      # 5. Menerapkan hasil build ke branch 'gh-pages'
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web # Direktori tempat hasil build disimpan
